"""
What: One file that configures ALL pytest behaviour globally.
Why: Without it, you'd pass --html=report.html --headed -v on the command line every single time.
How: You write settings once here — pytest reads it automatically on every run. 
You also register your custom markers (smoke, regression, api) here so pytest doesn't warn you about unknown markers.
"""


[pytest]

base_url = https://demo.realworld.show
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    --html=reports/report.html
    --self-contained-html
    -v
    --tb=short

markers =
    smoke:        Quick sanity checks
    regression:   Full regression suite
    api:          Tests that call the REST API directly
    ui:           Tests that drive the browser
    visual:       Screenshot comparison tests
    e2e:          Full user journey tests
    slow:         Tests that take longer than 10 seconds